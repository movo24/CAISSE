name: CI

# Lint, typecheck (via builds) and backend tests on every push / PR.
# Builds now run `tsc --noEmit` before bundling, so type errors fail CI.
# Note: all `run:` steps are static — no untrusted event input is interpolated.

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Resume preflight (env completeness + resume docs, structural)
        run: npm run preflight

      - name: Lint
        run: npm run lint

      - name: Security guards (secrets / env / gitignore / CI scripts)
        run: npm run test:security

      - name: API map freshness (POS_API_MAP_DETAILED matches the controllers)
        run: |
          npm run api:map
          git diff --exit-code POS_API_MAP_DETAILED.md || {
            echo "::error::POS_API_MAP_DETAILED.md est périmé — lancer 'npm run api:map' et committer le résultat."; exit 1; }

      - name: Backend tests
        run: npm run test:backend

      - name: Front unit tests (backoffice — vitest)
        run: npm run test:backoffice

      - name: Front unit tests (POS desktop — vitest)
        run: npm run test:pos

      - name: Front unit tests (mobile — vitest)
        run: npm run test:mobile

      - name: Wesley Control app (typecheck + vitest)
        run: |
          npm run typecheck:control
          npm run test:control

      - name: E2E spec collectable (playwright --list, no browser/DB)
        run: npm run test:e2e:list

      - name: Build backend (tsc + nest)
        run: npm run build:backend

      - name: Build backoffice (tsc --noEmit + vite)
        run: npm run build:backoffice

      - name: Build POS desktop renderer (tsc --noEmit + vite)
        run: npm run build:pos
