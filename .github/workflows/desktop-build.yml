name: Build POS Caisse Desktop (.exe)

# Builds the Windows installer + portable .exe on GitHub's Windows runners,
# so you get a real POS-Caisse-Setup.exe without owning a Windows machine.
#
# Trigger:
#   - manually (Actions tab -> "Run workflow"), or
#   - on a version tag like  desktop-v0.1.0
#
# Output: downloadable artifacts (and a Release when triggered by a tag).

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "VITE_API_URL to bake into the build (blank = production default)"
        required: false
        default: ""
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: packages/pos-desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      # Bake the API URL (optional). Empty -> apiConfig falls back to prod default.
      # The untrusted input is passed via env (never interpolated into the shell).
      - name: Write .env
        shell: bash
        env:
          API_URL: ${{ github.event.inputs.api_url }}
        run: echo "VITE_API_URL=${API_URL}" > .env

      # Build renderer (relative base) + main process + NSIS installer + portable.
      - name: Build Windows desktop
        run: npm run desktop:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: POS-Caisse-Windows
          path: |
            packages/pos-desktop/release/*.exe
          if-no-files-found: error

      # When triggered by a desktop-v* tag, attach the .exe files to a Release.
      - name: Publish release (tag only)
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/pos-desktop/release/*.exe
