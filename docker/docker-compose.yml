version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: caisse-postgres
    environment:
      POSTGRES_USER: caisse
      POSTGRES_PASSWORD: caisse
      POSTGRES_DB: caisse
    ports:
      - "5432:5432"
    volumes:
      - caisse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caisse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  caisse_pgdata:
