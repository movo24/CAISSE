# ── Nginx Reverse Proxy — addxintelligence.com ──────────────────
# Routes:
#   api.addxintelligence.com     → backend (NestJS :3001)
#   app.addxintelligence.com     → backoffice-web (React container :80)
#   pos.addxintelligence.com     → pos-desktop (React container :80)
#   m.addxintelligence.com       → mobile PWA (React container :80)
#   addxintelligence.com         → redirect → app.addxintelligence.com
# ─────────────────────────────────────────────────────────────────

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# Upstream servers (Docker service names)
upstream backend_upstream {
    server backend:3001;
}
upstream backoffice_upstream {
    server backoffice:80;
}
upstream pos_upstream {
    server pos:80;
}
upstream mobile_upstream {
    server mobile:80;
}

# ═══════════════════════════════════════════════════════════════
#  HTTP → HTTPS redirect (all subdomains)
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name addxintelligence.com
                *.addxintelligence.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ═══════════════════════════════════════════════════════════════
#  API — api.addxintelligence.com
# ═══════════════════════════════════════════════════════════════

server {
    listen 443 ssl;
    http2 on;
    server_name api.addxintelligence.com;

    ssl_certificate     /etc/letsencrypt/live/addxintelligence.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/addxintelligence.com/privkey.pem;
    include             /etc/nginx/ssl-params.conf;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Auth endpoints — stricter rate limit
    location ~ ^/api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;

        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Store-Id" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All API routes
    location / {
        limit_req zone=api_limit burst=50 nodelay;

        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Store-Id" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    client_max_body_size 10M;
}

# ═══════════════════════════════════════════════════════════════
#  BACKOFFICE — app.addxintelligence.com
# ═══════════════════════════════════════════════════════════════

server {
    listen 443 ssl;
    http2 on;
    server_name app.addxintelligence.com;

    ssl_certificate     /etc/letsencrypt/live/addxintelligence.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/addxintelligence.com/privkey.pem;
    include             /etc/nginx/ssl-params.conf;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.addxintelligence.com;" always;

    location / {
        proxy_pass http://backoffice_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

