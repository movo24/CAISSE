# ═══════════════════════════════════════════════════════════════
#  ROOT DOMAIN — addxintelligence.com → redirect backoffice
# ═══════════════════════════════════════════════════════════════

server {
    listen 443 ssl;
    http2 on;
    server_name addxintelligence.com;

    ssl_certificate     /etc/letsencrypt/live/addxintelligence.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/addxintelligence.com/privkey.pem;
    include             /etc/nginx/ssl-params.conf;

    return 301 https://app.addxintelligence.com$request_uri;
}
