# electron-builder configuration — The Wesley's POS desktop pack.
# Produces: The-Wesleys-POS-Setup-x64.exe (NSIS installer) + a portable .exe.
# Build with: npm run desktop:build  (Windows targets build on Windows/CI).
#
# appId is STABLE and must NEVER change after the first published release —
# electron-updater keys the update identity on it. (First release: v1.0.0.)
appId: com.thewesleys.pos
productName: The Wesley's POS
copyright: © The Wesley's
# Pinned because electron is hoisted to the monorepo root node_modules and
# electron-builder (run from the package dir) cannot auto-resolve the version.
# Keep in sync with devDependencies.electron.
electronVersion: 28.3.3

directories:
  # Compiled main (dist/main) + bundled renderer (dist/) are packaged.
  output: release
  buildResources: build

# Auto-update feed (electron-updater). GitHub Releases : le build génère
# latest.yml (canal stable) / beta.yml (canal pilote, pré-releases) et les
# publie sur la Release quand `--publish` est actif (tag desktop-v* en CI).
# app-update.yml est embarqué dans l'app → la caisse consomme des RELEASES
# publiées, jamais un git pull sur les sources.
publish:
  - provider: github
    owner: movo24
    repo: CAISSE
    releaseType: release

# What goes inside the app bundle. Renderer is the Vite `dist/` output.
files:
  - dist/**/*
  - package.json

# Renderer assets that must sit next to index.html (already in dist via Vite).
asar: true

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  # Silent one-click installer: NO wizard, NO "all users / just me" page, NO
  # Next/Finish buttons. Combined with perMachine:false the install ALWAYS lands
  # per-user in %LOCALAPPDATA%\Programs — no elevation, hence no UAC prompt on
  # update. A cashier never sees or clicks the installer.
  oneClick: true
  perMachine: false
  # Never request elevation: a per-user install never needs it, and a UAC prompt
  # must never reach a cashier on a production till.
  allowElevation: false
  # One-click installs to the fixed per-user location; no directory chooser.
  allowToChangeInstallationDirectory: false
  # Relaunch the POS automatically once the silent update has been applied.
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: The Wesley's POS
  # Business data (localStorage: sessions, machine id, peripheral action ledger)
  # is preserved across updates AND on uninstall — never wipe the terminal state.
  deleteAppDataOnUninstall: false
  # Fixed artifact name (no version) so the download link is stable across
  # versions; electron-updater resolves the exact file from latest.yml.
  artifactName: The-Wesleys-POS-Setup-${arch}.${ext}

portable:
  artifactName: The-Wesleys-POS-Portable-${arch}.${ext}

# macOS target (secondary priority) — lets the chain be proven on a Mac.
mac:
  icon: build/icon.png
  category: public.app-category.business
  target:
    - target: dmg
      arch: [arm64, x64]

# Linux (optional, future)
linux:
  icon: build/icon.png
  target: [AppImage]
  category: Office
